name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        # NEXT_PUBLIC_BASE_PATH sets the sub-path for GitHub Pages
        # e.g. https://username.github.io/willbanks-metals-portal
        # GITHUB_REPOSITORY is automatically "username/repo-name"
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          NEXT_PUBLIC_BASE_PATH="/$REPO_NAME" npm run build
        env:
          # Ensure demo mode (no Supabase keys needed for static export)
          NEXT_PUBLIC_SUPABASE_URL: ""
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ""

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out  # Next.js static export output directory

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
